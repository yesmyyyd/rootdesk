<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RootDesk - 开源远程桌面客户端</title>
  <script src="tailwindcss.3.4.17.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            background: '#0a0a0f',
            foreground: '#e4e4e7',
            card: '#131318',
            'card-hover': '#1a1a22',
            border: '#27272a',
            primary: '#3b82f6',
            'primary-hover': '#2563eb',
            muted: '#71717a',
            success: '#22c55e',
            danger: '#ef4444',
          }
        }
      }
    }
  </script>
  <style>
    * { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; overflow: hidden; margin: 0; }
    .sidebar-link { transition: all 0.2s; cursor: pointer; }
    .sidebar-link:hover { background: #1a1a22; }
    .sidebar-link.active { background: #1e3a5f; color: #3b82f6; }
    .toast { animation: slideIn 0.3s ease; }
    @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #131318; }
    ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #3f3f46; }
    
    iframe { width: 100%; height: 100%; border: none; }
    .content-frame { position: absolute; inset: 0; width: 100%; height: 100%; }
    .content-frame.hidden { display: none; }
  </style>
</head>
<body class="bg-background text-foreground h-screen flex flex-col">
  <div class="flex flex-1 overflow-hidden">
    <!-- Sidebar -->
    <aside class="w-56 bg-card border-r border-border flex flex-col z-20">
      <div class="p-4 border-b border-border">
        <div class="flex items-center gap-2">
          <div class="w-8 h-8 bg-primary rounded-lg flex items-center justify-center">
            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
            </svg>
          </div>
          <span class="font-bold text-lg">RootDesk</span>
        </div>
      </div>

      <div class="p-4 border-b border-border">
        <button onclick="alert('暂未开放')" class="flex items-center gap-3 w-full text-left hover:bg-card-hover p-2 rounded-lg transition">
          <div class="w-10 h-10 bg-border rounded-full flex items-center justify-center">
            <svg class="w-5 h-5 text-muted" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
            </svg>
          </div>
          <div>
            <div class="text-sm font-medium">登录</div>
            <div class="text-xs text-muted">点击登录</div>
          </div>
        </button>
      </div>

      <nav class="flex-1 p-2">
        <a onclick="navigate('remote.html', this)" class="sidebar-link active flex items-center gap-3 px-3 py-2.5 rounded-lg mb-1">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/>
          </svg>
          <span>远程控制</span>
        </a>
        <a onclick="navigate('devices.html', this)" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-lg mb-1 text-muted">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z"/>
          </svg>
          <span>设备列表</span>
        </a>
        <a onclick="navigate('settings.html', this)" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-lg mb-1 text-muted">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
          </svg>
          <span>设置</span>
        </a>
        <a onclick="navigate('about.html', this)" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-lg mb-1 text-muted">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
          <span>关于</span>
        </a>
      </nav>

      <div class="p-2 border-t border-border">
        <a href="#" class="sidebar-link flex items-center gap-3 px-3 py-2 rounded-lg text-muted text-sm">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8h2a2 2 0 012 2v6a2 2 0 01-2 2h-2v4l-4-4H9a1.994 1.994 0 01-1.414-.586m0 0L11 14h4a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2v4l.586-.586z"/>
          </svg>
          <span>交流群</span>
        </a>
        <a href="#" class="sidebar-link flex items-center gap-3 px-3 py-2 rounded-lg text-muted text-sm">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/>
          </svg>
          <span>开源地址</span>
        </a>
      </div>

      <div class="px-4 py-2 border-t border-border text-xs text-muted flex items-center gap-2" id="globalStatus">
        <span class="w-2 h-2 bg-danger rounded-full" id="statusDot"></span>
        <span id="statusText">主机: 未连接</span>
      </div>
    </aside>

    <!-- Main Content Frame -->
    <main class="flex-1 flex flex-col relative overflow-hidden bg-background">
      <iframe id="frame-remote.html" src="remote.html" class="content-frame" onload="onFrameLoad(this)"></iframe>
      <iframe id="frame-devices.html" src="" class="content-frame hidden" onload="onFrameLoad(this)"></iframe>
      <iframe id="frame-settings.html" src="" class="content-frame hidden" onload="onFrameLoad(this)"></iframe>
      <iframe id="frame-about.html" src="" class="content-frame hidden" onload="onFrameLoad(this)"></iframe>
    </main>
  </div>

  <!-- Update Modal (Moved from about.html) -->
  <div id="updateModal" class="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4 hidden">
    <div class="bg-card border border-border rounded-xl w-full max-w-md overflow-hidden shadow-2xl">
      <div class="p-4 border-b border-border bg-primary/10 flex items-center gap-3">
        <div class="w-10 h-10 bg-primary/20 rounded-lg flex items-center justify-center">
          <svg class="w-6 h-6 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 11l5-5m0 0l5 5m-5-5v12"/>
          </svg>
        </div>
        <div>
          <h3 class="font-bold">发现新版本</h3>
          <p class="text-xs text-muted">建议立即更新以获得最佳体验</p>
        </div>
      </div>
      <div class="p-6">
        <div class="flex items-center justify-between mb-4">
          <span class="text-sm text-muted">新版本: <span id="newVersionName" class="text-foreground font-bold">1.0.3</span></span>
          <span id="forceUpdateTag" class="px-2 py-0.5 bg-danger/20 text-danger text-[10px] rounded-full hidden">强制更新</span>
        </div>
        <div class="bg-black/20 rounded-lg p-4 mb-6">
          <h4 class="text-xs font-bold text-muted mb-2 uppercase tracking-wider">更新内容</h4>
          <div id="updateDesc" class="text-sm text-muted whitespace-pre-wrap leading-relaxed max-h-40 overflow-auto">
            1. 优化远程控制延迟
            2. 修复已知问题
            3. 增加文件列表搜索功能
          </div>
        </div>
        <div class="flex gap-3">
          <button id="cancelUpdateBtn" class="flex-1 px-4 py-2 border border-border hover:bg-card-hover rounded-lg transition text-sm">以后再说</button>
          <button id="confirmUpdateBtn" class="flex-1 px-4 py-2 bg-primary hover:bg-primary-hover text-white rounded-lg transition text-sm font-bold">立即更新</button>
        </div>
      </div>
    </div>
  </div>


  

  <!-- Toast -->
  <div id="toast" class="fixed bottom-6 right-6 bg-card border border-border rounded-lg px-4 py-3 shadow-lg hidden z-50">
    <div class="flex items-center gap-3">
      <svg id="toastIcon" class="w-5 h-5 text-success" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
      </svg>
      <span id="toastMessage"></span>
    </div>
  </div>

  <script>
    // Frame loading logic
    function onFrameLoad(frame) {
      if (!frame.classList.contains('hidden')) {
        if (frame.contentWindow && frame.contentWindow.onVisibilityChange) {
          frame.contentWindow.onVisibilityChange(true);
        }
      }
    }

    // Navigation logic
    function navigate(url, el) {
      document.querySelectorAll('.content-frame').forEach(frame => {
        frame.classList.add('hidden');
      });
      const targetFrame = document.getElementById(`frame-${url}`);
      if (targetFrame) {
        if (!targetFrame.src || targetFrame.src.endsWith('about:blank') || targetFrame.src === window.location.href) {
          targetFrame.src = url;
        }
        targetFrame.classList.remove('hidden');
        // Notify frame it became visible if needed
        if (targetFrame.contentWindow && targetFrame.contentWindow.onVisibilityChange) {
           targetFrame.contentWindow.onVisibilityChange(true);
        }
      }

      if (el) {
        document.querySelectorAll('nav .sidebar-link').forEach(link => {
          link.classList.remove('active');
          link.classList.add('text-muted');
        });
        el.classList.add('active');
        el.classList.remove('text-muted');
      }
    }

    // Pass messages or functions from iframe to shell
    window.addEventListener('message', function(event) {
      if (event.data && event.data.type === 'navigate') {
        const url = event.data.url.split('?')[0]; // Basic handling
        navigate(url);
        
        // Update active class based on URL
        document.querySelectorAll('nav .sidebar-link').forEach(link => {
          if (link.getAttribute('onclick').includes(url)) {
            link.classList.add('active');
            link.classList.remove('text-muted');
          } else {
            link.classList.remove('active');
            link.classList.add('text-muted');
          }
        });
      }
      if (event.data && event.data.type === 'showToast') {
        showToast(event.data.message, event.data.toastType || 'success');
      }
      if (event.data && event.data.type === 'updateStatus') {
        updateGlobalStatus(event.data.serverConnected, event.data.role);
      }
    });

    function updateGlobalStatus(serverConnected, role) {
      const statusDot = document.getElementById('statusDot');
      const statusText = document.getElementById('statusText');
      if (serverConnected) {
        statusDot.classList.remove('bg-danger');
        statusDot.classList.add('bg-success');
        statusText.textContent = `主机: 已连接 [${role}]`;
      } else {
        statusDot.classList.remove('bg-success');
        statusDot.classList.add('bg-danger');
        statusText.textContent = '主机: 未连接';
      }
    }

    // Pywebview Integration for shell
    window.addEventListener('pywebviewready', function() {
      // Periodic check for updates
      checkUpdatesBackground();
      //setInterval(checkUpdatesBackground, 60000 * 10); // Check every 10 minutes
      setInterval(checkUpdatesBackground, 8000);
      // Update global status
      if (window.pywebview && window.pywebview.api) {
        window.pywebview.api.get_init_data().then(data => {
          updateGlobalStatus(data.serverConnected, data.role);
        });
      }
    });

    function checkUpdatesBackground() {
      if (window.pywebview && window.pywebview.api) {
        window.pywebview.api.check_for_updates().then(res => {
          if (res.success && res.hasUpdate) {
            const ignoredVersion = localStorage.getItem('ignoredUpdateVersion');
            if (ignoredVersion !== res.versionName || res.isForce) {
              showUpdateModal(res);
            }
          }
        });
      }
    }

    function showUpdateModal(res) {
      document.getElementById('newVersionName').textContent = res.versionName;
      document.getElementById('updateDesc').textContent = res.versionDesc;
      if (res.isForce) {
        document.getElementById('forceUpdateTag').classList.remove('hidden');
        document.getElementById('cancelUpdateBtn').classList.add('hidden');
      } else {
        document.getElementById('forceUpdateTag').classList.add('hidden');
        document.getElementById('cancelUpdateBtn').classList.remove('hidden');
      }
      document.getElementById('updateModal').classList.remove('hidden');
      window.updateUrl = res.versionUrl;
      window.currentUpdateVersion = res.versionName;
    }

    // Close Modal
    document.getElementById('cancelUpdateBtn').addEventListener('click', function() {
      if (window.currentUpdateVersion) {
        localStorage.setItem('ignoredUpdateVersion', window.currentUpdateVersion);
      }
      document.getElementById('updateModal').classList.add('hidden');
    });

    // Confirm Update
    document.getElementById('confirmUpdateBtn').addEventListener('click', function() {
      if (window.updateUrl) {
        showToast('开始下载更新...');
        document.getElementById('updateModal').classList.add('hidden');
        if (window.pywebview && window.pywebview.api) {
          window.pywebview.api.start_update_process(window.updateUrl).then(res => {
            if (!res.success) {
              showToast('启动更新失败: ' + res.error, 'error');
            }
          });
        }
      }
    });

    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      const toastMessage = document.getElementById('toastMessage');
      const toastIcon = document.getElementById('toastIcon');
      
      toastMessage.textContent = message;
      toastIcon.className = type === 'success' ? 'w-5 h-5 text-success' : 'w-5 h-5 text-danger';
      
      toast.classList.remove('hidden');
      toast.classList.add('toast');
      
      setTimeout(() => {
        toast.classList.add('hidden');
        toast.classList.remove('toast');
      }, 3000);
    }
    
    // Provide a method for iframe to call check update manually
    window.manualCheckUpdate = function() {
      if (window.pywebview && window.pywebview.api) {
        return window.pywebview.api.check_for_updates().then(res => {
          if (res.success) {
            if (res.hasUpdate) {
              showUpdateModal(res);
            }
          }
          return res;
        });
      }
      return Promise.resolve({success: true, hasUpdate: false});
    };
  </script>
</body>
</html>
